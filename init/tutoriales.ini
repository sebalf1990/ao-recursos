[TUTORIAL1]
Grh=51653
Cantidad=3
texto1=Has caído, aventurero... Tu alma abandona el cuerpo... pero tu historia aún no termina. Camina hacia la ciudad más cercana... y busca al sacerdote. Él podrá devolverte a la vida. O... si lo prefieres... invoca tu poder y utiliza /hogar... para regresar a tu ciudad natal.
texto2=En la muerte... tu espíritu es más veloz. Aprovecha esta velocidad... y regresa rápidamente a un lugar seguro.
texto3=Ahora existes en otro plano... un mundo paralelo. No puedes ver a los vivos... pero ellos sí pueden ver tu alma errante. Si encuentran tu espíritu... y poseen los recursos... podrán devolverte a la vida.
en_texto1=You have fallen, adventurer... Your soul leaves your body... but your story is not over yet. Walk to the nearest city... and seek the priest. He can bring you back to life. Or... if you prefer... summon your power and use /hogar... to return to your hometown.
en_texto2=In death... your spirit becomes faster. Use this speed... and return quickly to a safe place.
en_texto3=You now exist in another plane... a parallel world. You cannot see the living... but they can see your wandering soul. If they find your spirit... and have the required resources... they can bring you back to life.
titulo=Estás muerto
en_titulo=You are dead
Activo=1

[TUTORIAL2]
Grh=36467
Cantidad=3
texto1=Detente... aventurero. Estás entrando en una zona insegura... Aquí, otros jugadores pueden atacarte sin piedad. Tus objetos... y tu oro... no están protegidos. Si caes... podrías perderlo todo.
texto2=Pero aún hay esperanza... Guarda tus pertenencias en la bóveda de la ciudad. Solo así... estarán a salvo de la muerte y el saqueo.
texto3=No solo los aventureros representan un peligro... Criaturas y NPCs habitan estas tierras... algunos con un poder devastador. Elige bien tus combates... o enfrentarás las consecuencias.
en_texto1=Stop... adventurer. You are entering a dangerous area... Here, other players may attack you without mercy. Your items... and your gold... are not protected. If you fall... you could lose everything.
en_texto2=But there is still hope... Store your belongings in the city vault. Only then... will they be safe from death and plunder.
en_texto3=Adventurers are not the only threat... Creatures and NPCs roam these lands... some with devastating power. Choose your battles wisely... or face the consequences.
titulo=Zona insegura
en_titulo=Danger zone
Activo=1

[TUTORIAL3]
Grh=3600
Cantidad=13
texto1=Bienvenido... a las tierras de Argentum. Un mundo lleno de peligros... y gloria. Si es tu primera vez aquí... presta atención... tu aventura comienza ahora.
texto2=A tu derecha... encontrarás tu inventario. Allí podrás gestionar tus pertenencias... y acceder a tus hechizos... si tu camino es el de la magia.
texto3=Tu inventario contiene lo esencial... equipo, comida, pociones. Cada elemento... puede significar la diferencia entre la vida y la muerte.
texto4=Comienzas como un simple newbie... con equipo básico y recursos limitados. Pero recuerda... este poder es temporal. Cuando crezcas... desaparecerá.
texto5=Las pociones restauran tus energías vitales... vida, maná, energía... incluso tu hambre y sed. No las desperdicies... podrían salvarte.
texto6=La energía define tu resistencia... pero depende de tu estado. Mantente alimentado... hidratado... y correctamente equipado.
texto7=En el menú... encontrarás múltiples opciones. Configuración... clanes... alianzas... el destino está en tus manos.
texto8=Observa bien... bajo el menú hay tres pociones. Oxígeno... agilidad... y fuerza. Con ellas... golpearás más rápido... más preciso... y más fuerte. Y con ello... ganarás más experiencia.
texto9=A la izquierda... en tus estadísticas... se encuentra tu oro equipado. Pero cuidado... si mueres... caerá junto a ti.
texto10=Un sabio consejo... visita al banquero. Guarda tu oro... protégelo... y retíralo solo cuando lo necesites.
texto11=No estás solo en este mundo... Puedes comunicarte con otros aventureros presionando ENTER. O interactuar directamente... con un clic derecho.
texto12=Si el camino se vuelve incierto... usa /GM. Un Game Master acudirá en tu ayuda... cuando más lo necesites.
texto13=Ahora... aventurero... el destino te espera. Adéntrate en estas tierras... y forja tu leyenda en Argentum Online.
en_texto1=Welcome... to the lands of Argentum. A world full of danger... and glory. If this is your first time here... pay attention... your adventure begins now.
en_texto2=To your right... you will find your inventory. There, you can manage your belongings... and access your spells... if your path is that of magic.
en_texto3=Your inventory holds the essentials... equipment, food, potions. Every item... can mean the difference between life and death.
en_texto4=You begin as a simple newbie... with basic gear and limited resources. But remember... this power is temporary. As you grow... it will fade away.
en_texto5=Potions restore your vital energies... health, mana, stamina... even hunger and thirst. Do not waste them... they may save your life.
en_texto6=Energy defines your endurance... but it depends on your condition. Stay fed... hydrated... and properly equipped.
en_texto7=In the menu... you will find many options. Settings... clans... alliances... your destiny is in your hands.
en_texto8=Look closely... beneath the menu are three potions. Oxygen... agility... and strength. With them... you will strike faster... more accurately... and harder. And with that... you will gain more experience.
en_texto9=On the left... within your stats... lies your equipped gold. But beware... if you die... it will fall with you.
en_texto10=A wise advice... visit the banker. Store your gold... protect it... and withdraw it only when needed.
en_texto11=You are not alone in this world... You can speak with other adventurers by pressing ENTER. Or interact directly... with a right click.
en_texto12=If your path becomes uncertain... use /GM. A Game Master will come to your aid... when you need it most.
en_texto13=Now... adventurer... destiny awaits you. Step into these lands... and forge your legend in Argentum Online.
titulo=Bienvenido a Argentum Online!
en_titulo=Welcome to Argentum Online!
Activo=1

[TUTORIAL4]
Grh=49200
Cantidad=3
texto1=Las habilidades... definen tu destino. Cada clase tiene su propio camino. Si dudas... consulta con un Game Master... antes de elegir.
texto2=Con cada nivel... obtendrás 5 puntos de habilidad. Pero la paciencia es clave... espera hasta el nivel 25... y planifica con sabiduría.
texto3=Recuerda bien esto... tus decisiones no pueden deshacerse. Ni siquiera los Game Masters podrán revertirlas. Elige con cuidado... o carga con las consecuencias.
en_texto1=Your skills... define your destiny. Each class has its own path. If you are unsure... consult a Game Master... before choosing.
en_texto2=With each level... you gain 5 skill points. But patience is key... wait until level 25... and plan wisely.
en_texto3=Remember this well... your choices cannot be undone. Not even Game Masters can reverse them. Choose carefully... or bear the consequences.
titulo=Habilidades
en_titulo=Skills
Activo=1







